name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: lychee-sitemap

jobs:
  build:
    name: Build artifact (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_suffix: linux-x86_64
            binary_path: target/release/lychee-sitemap
            archive_ext: tar.gz
          - os: macos-latest
            artifact_suffix: macos-aarch64
            binary_path: target/release/lychee-sitemap
            archive_ext: tar.gz
          - os: windows-latest
            artifact_suffix: windows-x86_64
            binary_path: target/release/lychee-sitemap.exe
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --locked

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          archive_name="${BINARY_NAME}-${{ matrix.artifact_suffix }}.${{ matrix.archive_ext }}"
          tar -czf "dist/${archive_name}" -C target/release "${BINARY_NAME}"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $archiveName = "${env:BINARY_NAME}-${{ matrix.artifact_suffix }}.${{ matrix.archive_ext }}"
          Compress-Archive -Path "${{ matrix.binary_path }}" -DestinationPath "dist/$archiveName"

      - name: Upload per-platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_suffix }}
          path: dist/*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
